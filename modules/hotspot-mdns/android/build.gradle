plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.hotspotmdns'
version = '1.0.0'

android {
  namespace "expo.modules.hotspotmdns"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }
}

dependencies {
  implementation("org.jmdns:jmdns:3.6.1")
}
